general.import = ["/home/lmcd/.config/alacritty/catppuccin/catppuccin-mocha.toml"]

[window]
opacity = 0.8
blur = true
#decorations = "none"

[cursor]
blink_interval = 700

[cursor.style]
shape = "Underline"
blinking = "On"

[font]
size = 12

[font.bold]
family = "CaskaydiaCove NFM"
style = "Bold"

[font.bold_italic]
family = "CaskaydiaCove NFM"
style = "Bold Italic"

[font.italic]
family = "CaskaydiaCove NFM"
style = "Italic"

[font.normal]
family = "CaskaydiaCove NFM"
style = "Regular"

[terminal]
osc52 = "CopyPaste"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
